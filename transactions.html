<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Операции — Менеджер финансов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="page-header">
        <h1>Операции</h1>
        <p>Добавление доходов и расходов, история с фильтрами</p>
      </header>

      <div id="alert"></div>

      <section class="section">
        <div class="card">
          <h2 style="margin-bottom:1rem">Новая операция</h2>
          <form id="transaction-form">
            <div class="grid grid-2">
              <div class="form-group">
                <label for="type">Тип</label>
                <select class="select" id="type" name="type">
                  <option value="expense">Расход</option>
                  <option value="income">Доход</option>
                </select>
              </div>
              <div class="form-group">
                <label for="category">Категория</label>
                <select class="select" id="category" name="category"></select>
              </div>
              <div class="form-group">
                <label for="amount">Сумма *</label>
                <input class="input" type="number" id="amount" name="amount" min="0.01" step="0.01" required>
              </div>
              <div class="form-group">
                <label for="date">Дата</label>
                <input class="input" type="date" id="date" name="date" required>
              </div>
            </div>
            <div class="form-group">
              <label for="description">Описание</label>
              <input class="input" type="text" id="description" name="description" placeholder="Например: продукты в магазине">
            </div>
            <button type="submit" class="btn btn-primary">Добавить</button>
          </form>
        </div>
      </section>

      <section class="section">
        <h2 style="margin-bottom:1rem">История</h2>
        <div class="filters">
          <input class="input" type="search" id="filter-search" placeholder="Поиск…">
          <select class="select" id="filter-type">
            <option value="">Все типы</option>
            <option value="income">Доходы</option>
            <option value="expense">Расходы</option>
          </select>
          <select class="select" id="filter-category"></select>
          <input class="input" type="date" id="filter-date-from" title="С даты">
          <input class="input" type="date" id="filter-date-to" title="По дату">
          <button class="btn btn-secondary btn-sm" id="filter-reset">Сбросить</button>
        </div>
        <div class="card table-wrap">
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Тип</th>
                <th>Описание</th>
                <th>Категория</th>
                <th>Сумма</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="transactions-body">
              <tr><td colspan="6" class="loading">Загрузка…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay hidden" id="delete-modal">
    <div class="modal">
      <h2>Удалить операцию?</h2>
      <p style="color:var(--text-muted)">Это действие нельзя отменить.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="delete-cancel">Отмена</button>
        <button class="btn btn-danger" id="delete-confirm">Удалить</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script type="module" src="js/transactions.js"></script>
</body>
</html>
