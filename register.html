<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — Менеджер финансов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <h1>Регистрация</h1>
      <p class="subtitle">Создайте аккаунт для управления финансами</p>
      <div id="alert"></div>
      <form id="register-form">
        <div class="form-group">
          <label for="fullName">Имя</label>
          <input class="input" type="text" id="fullName" name="fullName" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email *</label>
          <input class="input" type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Пароль *</label>
          <input class="input" type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirm">Подтвердите пароль *</label>
          <input class="input" type="password" id="confirm" name="confirm" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Создать аккаунт</button>
      </form>
      <p class="auth-footer">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
  </main>
  <script src="js/config.js"></script>
  <script type="module" src="js/register.js"></script>
</body>
</html>
