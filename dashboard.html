<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обзор — Менеджер финансов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="page-header">
        <h1>Обзор</h1>
        <p>Текущее состояние ваших финансов</p>
      </header>

      <section class="grid grid-3 section">
        <div class="card">
          <div class="card-title">Баланс</div>
          <div class="card-value balance" id="balance-value">—</div>
        </div>
        <div class="card">
          <div class="card-title">Доходы</div>
          <div class="card-value income" id="income-value">—</div>
        </div>
        <div class="card">
          <div class="card-title">Расходы</div>
          <div class="card-value expense" id="expense-value">—</div>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <h2>Последние операции</h2>
          <a href="transactions.html" class="btn btn-secondary btn-sm">Все операции</a>
        </div>
        <div class="card" id="recent-transactions">
          <div class="loading">Загрузка…</div>
        </div>
      </section>
    </main>
  </div>
  <script src="js/config.js"></script>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
